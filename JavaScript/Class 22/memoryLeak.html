<!-- 
what this code does?

This code demonstrates a memory leak scenario in JavaScript. 
It creates a large object (an array filled with "Leak") and 
sets up an interval to log its length every second. 
Even after the interval is cleared, the large object remains in memory 
because the interval's callback function still holds a reference to it.
This prevents the garbage collector from freeing up the memory used by the large object, 
leading to a memory leak. 

What is memory leak?
It occurs when a program retains references to objects that are no longer needed, 
preventing the garbage collector from freeing up memory, 
which can lead to increased memory usage and potential performance issues

how it occurs?
When a program creates objects and retains references to them, 
even after they are no longer needed.

how to avoid?
It can be prevented by ensuring that references to objects are properly 
released when they are no longer needed, to archive that 
we can use clearInterval, clearTimeout, removeEventListener, etc.
